<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProView AI Interviewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #05050a;
        --panel: rgba(10, 10, 15, 0.86);
        --panel-border: rgba(99, 102, 241, 0.24);
        --panel-shadow: 0 24px 80px rgba(0, 0, 0, 0.44);
        --text-main: rgba(241, 245, 249, 0.96);
        --text-muted: rgba(148, 163, 184, 0.9);
        --text-stage: rgba(103, 232, 249, 0.96);
        --accent-a: #44bcff;
        --accent-b: #7c3aed;
        --accent-c: #34d399;
        --grid: rgba(110, 231, 183, 0.08);
        --line: rgba(56, 189, 248, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text-main);
      }

      body {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 18% 18%, rgba(68, 188, 255, 0.18), transparent 34%),
          radial-gradient(circle at 82% 22%, rgba(124, 58, 237, 0.18), transparent 30%),
          radial-gradient(circle at 72% 78%, rgba(52, 211, 153, 0.16), transparent 28%),
          linear-gradient(160deg, #04040a 0%, #090b16 52%, #04050b 100%);
      }

      body::before,
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background-image:
          linear-gradient(90deg, var(--grid) 1px, transparent 1px),
          linear-gradient(var(--grid) 1px, transparent 1px);
        background-size: 24px 24px;
        opacity: 0.45;
        mask-image: radial-gradient(circle at center, black 38%, transparent 92%);
      }

      body::after {
        background: linear-gradient(to bottom, transparent, rgba(56, 189, 248, 0.1), transparent);
        animation: scan 4s linear infinite;
        mix-blend-mode: screen;
      }

      .shell {
        position: relative;
        width: min(620px, calc(100vw - 40px));
        padding: 24px;
        border-radius: 28px;
        border: 1px solid var(--panel-border);
        background:
          linear-gradient(180deg, rgba(18, 22, 38, 0.96), rgba(7, 10, 20, 0.94));
        box-shadow: var(--panel-shadow);
        overflow: hidden;
      }

      .shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at top left, rgba(68, 188, 255, 0.14), transparent 34%),
          radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.16), transparent 30%);
        pointer-events: none;
      }

      .window-bar {
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 22px;
      }

      .window-bar__dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
      }

      .window-bar__dot--red { background: #fb7185; }
      .window-bar__dot--yellow { background: #fbbf24; }
      .window-bar__dot--green { background: #4ade80; }

      .window-bar__title {
        margin-left: auto;
        font-size: 12px;
        letter-spacing: 0.18em;
        color: rgba(191, 219, 254, 0.92);
        text-transform: uppercase;
      }

      .hero {
        position: relative;
        display: grid;
        grid-template-columns: 1.2fr 0.9fr;
        gap: 22px;
        align-items: stretch;
      }

      .copy {
        position: relative;
        z-index: 1;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(96, 165, 250, 0.16);
        color: rgba(191, 219, 254, 0.96);
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .badge__pulse {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent-a), var(--accent-c));
        box-shadow: 0 0 18px rgba(56, 189, 248, 0.7);
        animation: pulse 1.8s ease-in-out infinite;
      }

      h1 {
        margin: 18px 0 14px;
        font-size: 38px;
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .brand {
        display: block;
        color: white;
      }

      .brand-gradient {
        display: block;
        background: linear-gradient(90deg, var(--accent-a), #c084fc 46%, var(--accent-c));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .desc {
        margin: 0 0 18px;
        max-width: 29rem;
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.8;
      }

      .status {
        margin-top: 22px;
        padding: 18px 18px 16px;
        border-radius: 20px;
        background: rgba(8, 12, 24, 0.92);
        border: 1px solid rgba(34, 211, 238, 0.16);
        box-shadow: inset 0 0 0 1px rgba(125, 211, 252, 0.05);
      }

      .status__message {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        color: rgba(248, 250, 252, 0.98);
      }

      .status__stage {
        margin: 10px 0 0;
        color: var(--text-stage);
        font-size: 14px;
        line-height: 1.6;
        min-height: 22px;
      }

      .progress {
        margin-top: 16px;
        width: 100%;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(15, 23, 42, 0.96);
        border: 1px solid rgba(125, 211, 252, 0.12);
      }

      .progress__bar {
        width: 38%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent-a), #a855f7 48%, var(--accent-c));
        box-shadow: 0 0 24px rgba(56, 189, 248, 0.45);
        animation: indeterminate 2.1s ease-in-out infinite;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 14px;
        color: rgba(148, 163, 184, 0.82);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .meta__dot {
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: rgba(103, 232, 249, 0.6);
      }

      .visual {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 288px;
        border-radius: 24px;
        border: 1px solid rgba(96, 165, 250, 0.12);
        background:
          radial-gradient(circle at 50% 28%, rgba(68, 188, 255, 0.14), transparent 28%),
          linear-gradient(180deg, rgba(8, 12, 24, 0.98), rgba(4, 8, 16, 0.96));
        overflow: hidden;
      }

      .visual::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(90deg, var(--line) 1px, transparent 1px),
          linear-gradient(var(--line) 1px, transparent 1px);
        background-size: 18px 18px;
        opacity: 0.35;
      }

      .orbit {
        position: absolute;
        border-radius: 999px;
        border: 1px solid rgba(125, 211, 252, 0.12);
        animation: rotate 10s linear infinite;
      }

      .orbit--a {
        width: 196px;
        height: 196px;
      }

      .orbit--b {
        width: 132px;
        height: 132px;
        animation-duration: 7.4s;
        animation-direction: reverse;
      }

      .orbit__dot {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent-a), var(--accent-c));
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.68);
      }

      .orbit--a .orbit__dot {
        top: -6px;
        left: calc(50% - 6px);
      }

      .orbit--b .orbit__dot {
        bottom: -6px;
        left: calc(50% - 6px);
      }

      .core {
        position: relative;
        width: 112px;
        height: 112px;
        border-radius: 28px;
        background:
          linear-gradient(145deg, rgba(68, 188, 255, 0.26), rgba(124, 58, 237, 0.26));
        border: 1px solid rgba(191, 219, 254, 0.18);
        box-shadow:
          inset 0 0 26px rgba(255, 255, 255, 0.05),
          0 0 44px rgba(68, 188, 255, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .core::before,
      .core::after {
        content: "";
        position: absolute;
        inset: 18px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .core::after {
        inset: 30px;
        border-radius: 14px;
      }

      .core__icon {
        font-size: 36px;
        line-height: 1;
        filter: drop-shadow(0 0 18px rgba(103, 232, 249, 0.4));
      }

      .terminal {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 16px;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(125, 211, 252, 0.12);
        background: rgba(2, 6, 23, 0.84);
        backdrop-filter: blur(8px);
      }

      .terminal__line {
        display: flex;
        align-items: center;
        gap: 10px;
        color: rgba(191, 219, 254, 0.88);
        font-family: "Cascadia Mono", "Consolas", monospace;
        font-size: 12px;
        line-height: 1.75;
        white-space: nowrap;
      }

      .terminal__prompt {
        color: #67e8f9;
      }

      .terminal__value {
        color: rgba(134, 239, 172, 0.94);
      }

      .terminal__cursor {
        display: inline-block;
        width: 9px;
        height: 16px;
        margin-left: 4px;
        background: linear-gradient(180deg, var(--accent-a), var(--accent-c));
        animation: blink 1s step-end infinite;
      }

      @keyframes scan {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.72; }
        50% { transform: scale(1.25); opacity: 1; }
      }

      @keyframes indeterminate {
        0% {
          transform: translateX(-130%);
        }
        50% {
          transform: translateX(95%);
        }
        100% {
          transform: translateX(250%);
        }
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes blink {
        0%, 50% { opacity: 1; }
        50.01%, 100% { opacity: 0; }
      }

      @media (max-width: 700px) {
        .shell {
          width: calc(100vw - 24px);
          padding: 18px;
          border-radius: 22px;
        }

        .hero {
          grid-template-columns: 1fr;
        }

        .visual {
          min-height: 220px;
        }

        h1 {
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <div class="window-bar">
        <span class="window-bar__dot window-bar__dot--red"></span>
        <span class="window-bar__dot window-bar__dot--yellow"></span>
        <span class="window-bar__dot window-bar__dot--green"></span>
        <span class="window-bar__title">boot sequence</span>
      </div>

      <div class="hero">
        <div class="copy">
          <div class="badge">
            <span class="badge__pulse"></span>
            <span>ProView AI Interviewer</span>
          </div>

          <h1>
            <span class="brand">正在接入你的</span>
            <span class="brand-gradient">AI 面试训练系统</span>
          </h1>

          <p class="desc">
            正在装载本地前后端服务、面试引擎与桌面界面。首次启动或大版本更新时，等待时间会稍长一些。
          </p>

          <div class="status">
            <p id="message" class="status__message">AI 面试官正在启动中...</p>
            <p id="stage" class="status__stage">正在唤醒本地面试引擎</p>

            <div class="progress" aria-hidden="true">
              <div class="progress__bar"></div>
            </div>

            <div class="meta">
              <span>Desktop Runtime</span>
              <span class="meta__dot"></span>
              <span>Local Backend</span>
              <span class="meta__dot"></span>
              <span>Renderer Boot</span>
            </div>
          </div>
        </div>

        <div class="visual" aria-hidden="true">
          <div class="orbit orbit--a">
            <span class="orbit__dot"></span>
          </div>
          <div class="orbit orbit--b">
            <span class="orbit__dot"></span>
          </div>
          <div class="core">
            <div class="core__icon">AI</div>
          </div>

          <div class="terminal">
            <div class="terminal__line">
              <span class="terminal__prompt">></span>
              <span>service:</span>
              <span class="terminal__value">interview-engine</span>
            </div>
            <div class="terminal__line">
              <span class="terminal__prompt">></span>
              <span>mode:</span>
              <span class="terminal__value">desktop-bootstrap</span>
            </div>
            <div class="terminal__line">
              <span class="terminal__prompt">></span>
              <span>status:</span>
              <span class="terminal__value">warming-up</span>
              <span class="terminal__cursor"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      const messageEl = document.getElementById('message')
      const stageEl = document.getElementById('stage')

      window.__PROVIEW_SPLASH_UPDATE = function updateSplash(payload) {
        if (!payload || typeof payload !== 'object') return
        if (typeof payload.message === 'string' && payload.message.trim()) {
          messageEl.textContent = payload.message
        }
        if (typeof payload.stage === 'string' && payload.stage.trim()) {
          stageEl.textContent = payload.stage
        }
      }
    </script>
  </body>
</html>
