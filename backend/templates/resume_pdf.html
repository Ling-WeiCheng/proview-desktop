<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 2cm; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "STSong-Light", "SimSun", serif;
    font-size: 11pt;
    line-height: 1.6;
    color: #1a1a2e;
  }
  .section { margin-bottom: 18px; }
  .section-title {
    font-size: 13pt;
    font-weight: 700;
    color: #4F46E5;
    border-bottom: 2px solid #4F46E5;
    padding-bottom: 4px;
    margin-bottom: 8px;
  }
  .section-content {
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .personal-info { text-align: center; margin-bottom: 20px; }
  .personal-info .name { font-size: 18pt; font-weight: 700; }
  .personal-info .section-content { font-size: 10pt; color: #555; }
  .avatar {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: #4F46E5;
    color: white;
    font-size: 22pt;
    font-weight: 700;
    text-align: center;
    line-height: 50px;
    display: inline-block;
    margin-bottom: 6px;
  }
</style>
</head>
<body>
{% for section in sections %}
<div class="section {% if section.type == 'personal_info' %}personal-info{% endif %}">
  {% if section.type == 'personal_info' %}
  <div class="avatar">{{ section.title[:1] }}</div>
  <div class="name">{{ section.title }}</div>
  {% else %}
  <div class="section-title">{{ section.title }}</div>
  {% endif %}
  <div class="section-content">{{ section.content }}</div>
</div>
{% endfor %}
</body>
</html>
